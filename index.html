<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROFILE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&family=Gaegu:wght@400;700&family=Nanum+Pen+Script&family=Gamja+Flower&family=Poor+Story&family=Single+Day&family=Stylish&family=Black+Han+Sans&family=Jua&family=East+Sea+Dokdo&family=Hi+Melody&family=Dongle:wght@400;700&family=Cute+Font&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-color: #f0e6ff;
    --bg-blur: 0px;
    --card-bg: #fff8ff;
    --grid-color: rgba(180,150,220,0.18);
    --font-main: 'Do Hyeon', sans-serif;
    --title-color: #5a1080;
    --field-bg: rgba(200,150,255,0.1);
    --field-text: #4a1070;
    --field-label-color: #9860c0;
    --accent-color: #9840d0;
    --accent-soft: rgba(180,120,240,0.18);
    --accent-mid: rgba(180,120,240,0.35);
    --box-shadow-color: rgba(120,60,180,0.18);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--bg-color);
    font-family: var(--font-main);
    user-select: none;
    overflow: hidden;
    box-sizing: border-box;
    padding-top: 70px; /* JS(applyCardSize)가 실제 툴바 높이로 바로 갱신함 */
  }
  /* 모바일에서는 카드가 화면보다 커질 수 있어 페이지 자체 스크롤을 허용 */
  body.mobile-view {
    height: auto;
    min-height: 100vh;
    overflow-y: auto;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }
  body > * { position: relative; z-index: 1; }

  /* ── 상단 툴바 ── */
  #topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; gap: 8px;
    padding: 8px 16px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(180,150,220,0.3);
    flex-wrap: wrap;
  }
  #topbar button, #topbar select, #topbar input[type=color], #topbar input[type=range] {
    font-family: var(--font-main);
    font-size: 13px;
    padding: 4px 10px;
    border: 1px solid #c9a8e8;
    border-radius: 20px;
    background: #f7eeff;
    cursor: pointer;
    color: #5a3080;
    outline: none;
    transition: background 0.15s;
  }
  #topbar button:hover { background: #e8d0ff; }
  #topbar input[type=color] { padding: 2px 4px; width: 36px; height: 28px; border-radius: 8px; }
  #topbar input[type=range] { width: 80px; padding: 0 4px; }
  #topbar label { font-size: 12px; color: #7a50a0; }
  .tb-sep { width: 1px; height: 24px; background: #c9a8e8; margin: 0 4px; }
  #admin-btn { background: #ffe8f5; border-color: #e8a0c8; color: #8a2060; }
  #admin-btn.logged { background: #d4f5e0; border-color: #60c890; color: #1a6040; }
  #snap-toggle-btn.snap-on { background: #d4f5e0; border-color: #60c890; color: #1a6040; }
  #snap-toggle-btn.snap-off { background: #f0f0f0; border-color: #ccc; color: #888; }

  /* ── 카드 씬 ── */
  #card-scene {
    perspective: 1200px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #card-wrapper {
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.7s cubic-bezier(.4,0,.2,1);
  }
  #card-wrapper.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; top: 0; left: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: var(--card-bg);
    border-radius: 22px;
    box-shadow: 0 8px 40px var(--box-shadow-color), 0 2px 8px rgba(0,0,0,0.08);
    overflow: hidden;
    width: 100%; height: 100%;
  }
  #card-back { transform: rotateY(180deg); }
  #card-front { position: relative; }

  /* ── 앞면 ── */
  #front-inner {
    padding: 28px 24px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    height: 100%;
    box-sizing: border-box;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;      /* Firefox */
    -ms-overflow-style: none;   /* IE/Edge */
  }
  #front-inner::-webkit-scrollbar { display: none; }  /* Chrome/Safari */
  #front-title-wrap { width: 100%; text-align: center; }
  #front-title {
    font-size: 22px; font-weight: bold; color: var(--title-color);
    border: none; background: transparent; text-align: center;
    width: 100%; outline: none;
    font-family: var(--font-main);
  }
  #front-title:focus { background: rgba(200,150,255,0.08); border-radius: 8px; }

  #profile-wrap {
    position: relative;
    margin: 4px 0;
  }
  #profile-img-container {
    width: 90px; height: 90px;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    background: #f0d8ff;
    cursor: pointer;
    transition: box-shadow 0.2s;
  }
  #profile-img-container:hover { box-shadow: 0 0 0 3px var(--accent-color); }
  #profile-img-container img {
    width: 100%; height: 100%; object-fit: cover;
  }
  #profile-img-container .placeholder {
    font-size: 32px; color: #c890ff;
  }
  /* 프로필 모양 */
  .shape-rect   #profile-img-container { border-radius: 8px; }
  .shape-round  #profile-img-container { border-radius: 20px; }
  .shape-circle #profile-img-container { border-radius: 50%; }
  .shape-polaroid { padding: 6px 6px 22px; background: #fff; box-shadow: 0 4px 14px rgba(0,0,0,0.15); }
  .shape-polaroid #profile-img-container { border-radius: 4px; }

  #fields-wrap { width: 100%; display: flex; flex-direction: column; gap: 6px; }
  .field-row {
    display: flex; align-items: center; gap: 6px;
    background: var(--field-bg); border-radius: 10px; padding: 4px 10px;
  }
  .field-label { font-size: 12px; color: var(--field-label-color); white-space: nowrap; }
  .field-input {
    flex: 1; border: none; background: transparent;
    font-family: var(--font-main); font-size: 14px; color: var(--field-text);
    outline: none; min-width: 0;
  }
  .field-input:focus { background: rgba(200,150,255,0.12); border-radius: 6px; }

  #icons-wrap {
    display: flex; gap: 12px; margin-top: 4px;
  }
  .front-icon {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%; background: rgba(200,150,255,0.2);
    font-size: 20px; cursor: pointer;
    position: relative; overflow: hidden;
  }
  .front-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .front-icon:hover { background: rgba(200,150,255,0.4); }

  #flip-btn-front, #flip-btn-back {
    position: absolute; bottom: 12px; right: 16px;
    background: var(--accent-soft);
    border: none; border-radius: 20px; padding: 5px 14px;
    font-family: var(--font-main); font-size: 13px; color: var(--accent-color);
    cursor: pointer; z-index: 56;
    transition: background 0.15s;
  }
  #flip-btn-front:hover, #flip-btn-back:hover { background: var(--accent-mid); }

  /* ── 뒷면 ── */
  #back-inner {
    position: relative; width: 100%; height: 100%;
    overflow: hidden;
  }
  #pages-container {
    position: relative;
    width: 100%; height: 100%;
  }
  .page {
    width: 100%; height: 100%;
    position: relative;
    overflow-y: auto;
    overflow-x: hidden;
    /* 위: 페이지 탭, 아래: 뒤집기 버튼과 겹치지 않도록 여백 확보 */
    padding: 46px 0 58px 0;
    box-sizing: border-box;
    /* 스크롤은 되지만 스크롤바는 안 보이게 */
    scrollbar-width: none;      /* Firefox */
    -ms-overflow-style: none;   /* IE/Edge */
  }
  .page::-webkit-scrollbar { display: none; }  /* Chrome/Safari */
  .page-content {
    position: relative;
    width: 100%; height: 100%;
  }

  /* 페이지 잠금 */
  .page-lock-overlay {
    position: absolute; inset: 0; z-index: 90;
    background: rgba(255,255,255,0.92);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px;
    border-radius: 0;
  }
  .page-lock-overlay .lock-icon { font-size: 48px; }
  .page-lock-overlay input {
    font-family: var(--font-main); font-size: 16px;
    padding: 8px 16px; border: 2px solid #c890ff; border-radius: 12px;
    outline: none; text-align: center;
  }
  .page-lock-overlay button {
    font-family: var(--font-main); font-size: 14px;
    padding: 7px 20px; border: none; border-radius: 12px;
    background: #c890ff; color: #fff; cursor: pointer;
  }

  /* 페이지 전환은 상단 탭으로만 — 화살표/점 인디케이터는 숨김 */
  #page-prev, #page-next, #page-indicator { display: none !important; }
  .page-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent-soft); cursor: pointer;
    transition: background 0.2s;
  }
  .page-dot.active { background: var(--accent-color); }

  /* ── 박스 ── */
  .back-box {
    position: absolute;
    min-width: 80px; min-height: 50px;
    border-radius: 12px;
    background: #fff8e8;
    border: 1.5px solid #e0c880;
    padding: 8px 10px 8px 10px;
    overflow: hidden;
    display: flex; flex-direction: column;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .back-box .box-header {
    font-size: 11px; font-weight: bold; color: #9a7020;
    margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center;
    cursor: move; user-select: none; touch-action: none;
  }
  .back-box .box-header .box-title-edit {
    font-family: var(--font-main); font-size: 11px; font-weight: bold;
    background: transparent; border: none; outline: none;
    color: inherit; flex: 1; min-width: 0;
    cursor: text;
  }
  .back-box .box-body {
    flex: 1; font-size: 13px; color: #4a3800;
    outline: none; overflow: auto; white-space: pre-wrap;
    font-family: var(--font-main);
    user-select: text;
    min-height: 30px;
    scrollbar-width: none;      /* Firefox */
    -ms-overflow-style: none;   /* IE/Edge */
  }
  .back-box .box-body::-webkit-scrollbar { display: none; }  /* Chrome/Safari */
  .back-box .box-body.code-body {
    font-family: 'Courier New', monospace; font-size: 12px;
    background: rgba(0,0,0,0.04); border-radius: 6px; padding: 4px;
  }
  .back-box-img { width: 100%; max-height: 80px; object-fit: cover; border-radius: 6px; margin-top: 4px; }

  /* 박스 리사이즈 핸들 */
  .resize-handle {
    position: absolute; bottom: 0; right: 0;
    width: 14px; height: 14px; cursor: se-resize;
    background: linear-gradient(135deg, transparent 50%, rgba(180,120,240,0.4) 50%);
    border-radius: 0 0 12px 0;
  }

  /* 박스 컨트롤 버튼 */
  .box-ctrl-btn {
    font-size: 12px; cursor: pointer; padding: 1px 4px;
    border-radius: 4px; border: none; background: transparent;
    color: inherit; opacity: 0.6; line-height: 1;
    flex-shrink: 0;
  }
  .box-ctrl-btn:hover { opacity: 1; background: rgba(0,0,0,0.08); }

  /* ── 스티커 ── */
  .sticker {
    position: absolute;
    font-size: 28px; cursor: grab;
    user-select: none; touch-action: none;
    display: flex; align-items: center; justify-content: center;
    width: 44px; height: 44px;
    transform-origin: center center;
    overflow: hidden;
  }
  .sticker img { width: 100%; height: 100%; object-fit: cover; pointer-events: none; border-radius: 8px; }
  .sticker-sel-ring {
    position: absolute; inset: -6px;
    border: 2px dashed var(--accent-color); border-radius: 6px;
    pointer-events: none;
  }
  .sticker-resize-handle {
    position: absolute; right: -11px; bottom: -11px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--accent-color); border: 2px solid #fff;
    cursor: nwse-resize; pointer-events: auto;
    box-shadow: 0 1px 4px rgba(0,0,0,0.35);
    touch-action: none;
  }
  .sticker-rotate-handle {
    position: absolute; left: 50%; top: -28px; transform: translateX(-50%);
    width: 15px; height: 15px; border-radius: 50%;
    background: #fff; border: 2px solid var(--accent-color);
    cursor: grab; pointer-events: auto;
    box-shadow: 0 1px 4px rgba(0,0,0,0.35);
    touch-action: none;
  }
  .sticker-rotate-handle::after {
    content: ''; position: absolute; left: 50%; top: 100%;
    width: 1px; height: 13px; background: var(--accent-color);
    transform: translateX(-50%);
  }

  /* ── 자유 텍스트 ── */
  .free-text {
    position: absolute;
    min-width: 60px; min-height: 20px;
    font-family: var(--font-main); font-size: 15px;
    color: #4a1070; outline: none;
    cursor: move; user-select: text;
    white-space: pre-wrap; word-break: break-word;
    touch-action: none;
  }
  .free-text:focus { cursor: text; }

  /* ── 정렬 가이드라인 (드래그 중 다른 요소/카드 중앙과 맞춰지면 표시) ── */
  .align-guide {
    position: absolute;
    background: #ff4fa3;
    z-index: 500;
    pointer-events: none;
    display: none;
    box-shadow: 0 0 4px rgba(255,79,163,0.6);
  }
  .align-guide-v { width: 1px; top: 0; bottom: 0; }
  .align-guide-h { height: 1px; left: 0; right: 0; }

  /* ── 형광펜 ── */
  mark { background: yellow; color: inherit; border-radius: 2px; }
  mark.hl-pink { background: #ffb3d9; }
  mark.hl-green { background: #b3ffcc; }
  mark.hl-blue { background: #b3e0ff; }

  /* ── 인라인 툴바 (선택 시) ── */
  #inline-toolbar {
    position: fixed; z-index: 2000;
    background: #fff; border: 1px solid #c890ff;
    border-radius: 20px; padding: 4px 8px;
    display: none; gap: 4px; align-items: center;
    box-shadow: 0 4px 16px rgba(120,60,180,0.18);
  }
  #inline-toolbar button {
    font-family: var(--font-main); font-size: 12px;
    border: 1px solid #e0c0ff; border-radius: 12px;
    padding: 2px 8px; background: #f7eeff; cursor: pointer; color: #5a3080;
  }
  #inline-toolbar button:hover { background: #e8d0ff; }
  #inline-toolbar input[type=number] {
    width: 44px; font-size: 12px; text-align: center;
    border: 1px solid #c890ff; border-radius: 8px; padding: 2px 4px;
    font-family: var(--font-main); color: #5a3080; outline: none;
  }
  #inline-toolbar select#font-family-input {
    max-width: 100px; font-size: 12px; text-align: center;
    border: 1px solid #c890ff; border-radius: 8px; padding: 2px 4px;
    font-family: var(--font-main); color: #5a3080; outline: none; background: #f7eeff; cursor: pointer;
  }

  /* ── 카드 리사이즈 핸들 (세로 길이만 조절) ── */
  #card-resize-handle {
    position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
    width: 34px; height: 18px; cursor: ns-resize; z-index: 100;
    background: var(--accent-color);
    border-radius: 10px;
    touch-action: none;
  }
  #card-resize-handle::before {
    content: '↕'; position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 11px; line-height: 1;
  }

  /* ── 모달 공통 ── */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 5000;
    background: rgba(60,0,100,0.35);
    display: flex; align-items: center; justify-content: center;
  }
  .modal-box {
    background: #fff; border-radius: 18px; padding: 28px 32px;
    box-shadow: 0 8px 40px rgba(120,60,180,0.25);
    min-width: 300px; max-width: 440px; width: 90%;
    font-family: var(--font-main);
  }
  .modal-box h3 { font-size: 18px; color: #5a1080; margin-bottom: 16px; }
  .modal-box label { font-size: 13px; color: #7a50a0; display: block; margin-bottom: 4px; margin-top: 12px; }
  .modal-box input[type=text], .modal-box input[type=password] {
    width: 100%; padding: 8px 12px; border: 1.5px solid #c890ff; border-radius: 10px;
    font-family: var(--font-main); font-size: 14px; outline: none; color: #4a1070;
  }
  .modal-box input:focus { border-color: #9040d0; }
  .modal-btns { display: flex; gap: 10px; margin-top: 18px; justify-content: flex-end; }
  .modal-btns button {
    font-family: var(--font-main); font-size: 14px;
    padding: 8px 20px; border: none; border-radius: 12px; cursor: pointer;
  }
  .btn-primary { background: #c890ff; color: #fff; }
  .btn-primary:hover { background: #a060d0; }
  .btn-cancel { background: #f0e0ff; color: #7a50a0; }
  .btn-cancel:hover { background: #e0c0ff; }
  .btn-danger { background: #ffb0b0; color: #800; }
  .btn-danger:hover { background: #ff8080; }

  /* ── 동기화 상태 ── */
  #sync-status {
    position: fixed; bottom: 16px; right: 16px; z-index: 4000;
    font-family: var(--font-main); font-size: 13px;
    padding: 8px 16px; border-radius: 20px;
    background: rgba(255,255,255,0.9);
    border: 1px solid #c890ff;
    color: #5a3080; display: none;
    box-shadow: 0 2px 12px rgba(120,60,180,0.12);
  }
  #sync-status.ok { border-color: #60c890; color: #1a6040; background: #e8fff4; }
  #sync-status.err { border-color: #e06060; color: #800; background: #fff0f0; }
  #sync-status.loading { border-color: #c890ff; color: #5a3080; }

  /* 박스 전체 복제 버튼 (헤더 안, ⋮ 옆) */
  .box-dup-btn {
    font-family: var(--font-main); font-size: 11px;
    padding: 2px 10px; border: 1px solid #c890ff; border-radius: 20px;
    background: #f7eeff; color: #5a3080; cursor: pointer;
    flex-shrink: 0; line-height: 1.4;
  }
  .box-dup-btn:hover { background: #e8d0ff; }

  /* ── 뒷면 페이지 탭 ── */
  #page-tabs {
    position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; z-index: 60;
    flex-wrap: wrap; justify-content: center;
    max-width: 80%;
  }
  .page-tab {
    font-family: var(--font-main); font-size: 11px;
    padding: 2px 10px; border-radius: 10px;
    background: var(--accent-soft); border: 1px solid var(--accent-color);
    cursor: pointer; color: var(--accent-color); transition: background 0.15s;
    display: flex; align-items: center; gap: 4px;
  }
  .page-tab.active { background: var(--accent-color); color: #fff; }
  .page-tab .tab-lock { font-size: 10px; }

  /* 방문자 잠금 */
  body.visitor .editable-hide { display: none !important; }
  body.visitor [contenteditable=true] { pointer-events: none; cursor: default; }
  body.visitor .field-input { pointer-events: none; }
  body.visitor .edit-only { display: none !important; }

  /* 이미지 보호 */
  img { -webkit-user-drag: none; user-drag: none; pointer-events: none; }
  .front-icon img, #profile-img-container img { pointer-events: auto; }

  /* ── 컨텍스트 메뉴 ── */
  #ctx-menu {
    position: fixed; z-index: 6000;
    background: #fff; border: 1px solid #c890ff; border-radius: 12px;
    padding: 4px 0; min-width: 150px;
    box-shadow: 0 4px 20px rgba(120,60,180,0.18); display: none;
    font-family: var(--font-main);
  }
  #ctx-menu .ctx-item {
    padding: 8px 16px; font-size: 13px; color: #5a3080; cursor: pointer;
  }
  #ctx-menu .ctx-item:hover { background: #f0e0ff; }
  #ctx-menu .ctx-item.danger { color: #c00; }
  #ctx-menu .ctx-sep { height: 1px; background: #e8d0ff; margin: 3px 0; }

  /* ══════════════════════════════════════════════
     모바일 반응형 – 박스 위치를 재배치하지 않고,
     데스크톱에서 편집한 레이아웃을 그대로 유지한 채
     화면 폭에 맞춰 카드 전체를 축소해서 보여준다.
     ══════════════════════════════════════════════ */
  body.mobile-view #card-scene {
    width: 100%;
    padding: 0 12px 24px;
    box-sizing: border-box;
    display: block;
  }

  body.mobile-view.visitor #admin-btn,

  body.mobile-view #card-wrapper {

<script>
// ══════════════════════════════════════════════
//  전역 상태
// ══════════════════════════════════════════════
// 방문자(비관리자)도 이 Gist에서 자동으로 데이터를 불러옵니다.
// Gist ID는 비밀번호가 아니라 "주소" 역할이라 코드에 그대로 노출되어도 안전합니다.
// (절대 GitHub 토큰은 여기에 넣지 마세요 - 토큰은 관리자 로그인 시 브라우저에만 저장됩니다)
const DEFAULT_GIST_ID = '92cf8cd548a09099d624843eebe400ab';

let isAdmin = false;
let isFlipped = false;
let currentPage = 0;
let pages = []; // [{ boxes:[], stickers:[], freeTexts:[], locked:false, password:'', unlockedByUser:false }]
let frontCardSize = { w: 360, h: 520 };
let backCardSize  = { w: 360, h: 520 };
let selectedEl = null;   // 현재 선택된 박스/스티커

// ══════════════════════════════════════════════
//  정렬 스냅 (그리드에 맞춰 배치)
//  배경의 격자 눈금(32px)에 맞춰 드래그/리사이즈 값을
//  스냅시켜 완전 자유배치보다 정돈된 배치가 되도록 돕는다.
// ══════════════════════════════════════════════
let snapEnabled = true;
const SNAP_SIZE = 16;
function snap(v) {
  if (!snapEnabled) return v;
  return Math.round(v / SNAP_SIZE) * SNAP_SIZE;
}
function toggleSnap() {
  snapEnabled = !snapEnabled;
  const btn = document.getElementById('snap-toggle-btn');
  if (btn) {
    btn.textContent = snapEnabled ? '🧲 스냅/가이드 켜짐' : '🧲 스냅/가이드 꺼짐';
    btn.classList.toggle('snap-on', snapEnabled);
    btn.classList.toggle('snap-off', !snapEnabled);
  }
}

// ══════════════════════════════════════════════
//  정렬 가이드라인 (Figma/Canva 식 스마트 가이드)
//  드래그 중인 요소가 카드 중앙이나 다른 박스/스티커/텍스트의
//  가장자리·중앙과 맞춰지면 분홍색 선을 보여주고 그 위치로 스냅
// ══════════════════════════════════════════════
const GUIDE_THRESHOLD = 6;

function getAlignTargets(container, excludeEl) {
  const targets = [];
  container.querySelectorAll('.back-box, .sticker, .free-text').forEach(el => {
    if (el === excludeEl) return;
    if (el.style.display === 'none') return;
    const left = el.offsetLeft, top = el.offsetTop, w = el.offsetWidth, h = el.offsetHeight;
    targets.push({ left, right: left + w, centerX: left + w / 2, top, bottom: top + h, centerY: top + h / 2 });
  });
  // 카드(페이지) 중앙 가이드
  const cw = container.clientWidth, ch = container.clientHeight;
  targets.push({ left: cw / 2, right: cw / 2, centerX: cw / 2, top: ch / 2, bottom: ch / 2, centerY: ch / 2 });
  return targets;
}

function getGuideEls(container) {
  return {
    v: container.querySelector(':scope > .align-guide-v'),
    h: container.querySelector(':scope > .align-guide-h'),
  };
}

// x,y,w,h: 이동 중인 요소의 현재 위치/크기(px, container 기준)
// 반환값: 가이드에 맞춰 보정된 {x, y}
function applyAlignGuides(container, excludeEl, x, y, w, h) {
  const { v: guideV, h: guideH } = getGuideEls(container);
  if (!guideV || !guideH) return { x, y };
  if (!snapEnabled) { guideV.style.display = 'none'; guideH.style.display = 'none'; return { x, y }; }
  const targets = getAlignTargets(container, excludeEl);
  const myX = [x, x + w / 2, x + w];
  const myY = [y, y + h / 2, y + h];
  let outX = null, lineX = null, outY = null, lineY = null;

  for (const t of targets) {
    if (outX === null) {
      for (const mx of myX) {
        for (const tx of [t.left, t.centerX, t.right]) {
          if (Math.abs(mx - tx) <= GUIDE_THRESHOLD) { outX = x + (tx - mx); lineX = tx; break; }
        }
        if (outX !== null) break;
      }
    }
    if (outY === null) {
      for (const my of myY) {
        for (const ty of [t.top, t.centerY, t.bottom]) {
          if (Math.abs(my - ty) <= GUIDE_THRESHOLD) { outY = y + (ty - my); lineY = ty; break; }
        }
        if (outY !== null) break;
      }
    }
    if (outX !== null && outY !== null) break;
  }

  if (lineX !== null) { guideV.style.left = lineX + 'px'; guideV.style.display = 'block'; }
  else guideV.style.display = 'none';
  if (lineY !== null) { guideH.style.top = lineY + 'px'; guideH.style.display = 'block'; }
  else guideH.style.display = 'none';

  return { x: outX !== null ? outX : snap(x), y: outY !== null ? outY : snap(y) };
}

function hideAlignGuides(container) {
  const { v: guideV, h: guideH } = getGuideEls(container);
  if (guideV) guideV.style.display = 'none';
  if (guideH) guideH.style.display = 'none';
}

// ══════════════════════════════════════════════
//  모바일 반응형 모드
//  화면이 좁으면(≈모바일) 카드가 가로/세로로 자연스럽게
//  줄어들고, 뒷면 박스는 절대좌표 대신 추가한 순서대로
//  세로로 차례차례 쌓여서 보여지도록 전환한다.
// ══════════════════════════════════════════════
const mobileMQ = window.matchMedia('(max-width: 640px)');
function applyMobileMode() {
  document.body.classList.toggle('mobile-view', mobileMQ.matches);
  updateMobileScenePadding();
  applyMobileScale();
}
function updateMobileScenePadding() {
  const scene = document.getElementById('card-scene');
  if (!scene) return;
  if (!document.body.classList.contains('mobile-view')) { scene.style.paddingTop = ''; return; }
  const topbar = document.getElementById('topbar');
  const h = topbar ? topbar.offsetHeight : 0;
  scene.style.paddingTop = (h + 16) + 'px';
}
// 카드(데스크톱과 동일한 고정 px 크기)를 모바일 화면 폭에 맞춰 축소 비율을 계산해
// #card-wrapper에 --mobile-scale 변수로 적용하고, 축소된 만큼 씬의 예약 높이도 줄여
// 카드 아래로 빈 여백이 남지 않도록 한다.
function applyMobileScale() {
  const scene = document.getElementById('card-scene');
  const wrapper = document.getElementById('card-wrapper');
  if (!scene || !wrapper) return;
  if (!document.body.classList.contains('mobile-view')) {
    wrapper.style.removeProperty('--mobile-scale');
    return; // 데스크톱 높이(applyCardSize가 설정)는 그대로 둔다
  }
  const cs = getComputedStyle(scene);
  const padL = parseFloat(cs.paddingLeft) || 0, padR = parseFloat(cs.paddingRight) || 0;
  const usable = scene.clientWidth - padL - padR;
  const cardW = isFlipped ? backCardSize.w : frontCardSize.w;
  const scale = cardW > 0 ? Math.min(1, usable / cardW) : 1;
  wrapper.style.setProperty('--mobile-scale', scale);
  // offsetHeight는 transform의 영향을 받지 않는 실제(축소 전) 높이
  const naturalH = wrapper.offsetHeight;
  scene.style.height = Math.round(naturalH * scale) + 'px';
}
function initMobileMode() {
  applyMobileMode();
  if (mobileMQ.addEventListener) mobileMQ.addEventListener('change', applyMobileMode);
  else mobileMQ.addListener(applyMobileMode); // 구형 브라우저 대응
  window.addEventListener('resize', () => { updateMobileScenePadding(); applyCardSize(); });
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card-wrapper').classList.toggle('flipped', isFlipped);
  applyCardSize();
}

function applyCardSize() {
  const w = document.getElementById('card-wrapper');
  const curPage = pages[currentPage];
  const backH = (curPage && typeof curPage.cardH === 'number') ? curPage.cardH : backCardSize.h;
  const width  = isFlipped ? backCardSize.w : frontCardSize.w;
  const height = isFlipped ? backH : frontCardSize.h;
  // card-scene perspective 고정 (모든 페이지 높이 중 최대값 기준으로 씬 크기 확보)
  const scene = document.getElementById('card-scene');
  const isMobile = document.body.classList.contains('mobile-view');
  if (!isMobile) {
    // 상단 툴바 높이만큼 body에 여백을 줘서, 그 아래 남은 영역 안에서
    // 카드가 스크롤 없이 항상 정중앙에 오도록 한다.
    const topbar = document.getElementById('topbar');
    const topbarH = topbar ? topbar.offsetHeight : 0;
    document.body.style.paddingTop = topbarH + 'px';

    // 실제로 화면에 쓸 수 있는 높이/너비 (여유 여백 확보)
    const availH = Math.max(200, window.innerHeight - topbarH - 32);
    const availW = Math.max(200, window.innerWidth - 32);

    // 카드 자체는 화면을 넘지 않도록 제한하고, 그보다 긴 내용은
    // 카드 내부(.page / #front-inner)의 스크롤로만 보이게 한다.
    w.style.width  = Math.min(width, availW) + 'px';
    w.style.height = Math.min(height, availH) + 'px';

    const allBackH = pages.map(p => (typeof p.cardH === 'number') ? p.cardH : backCardSize.h);
    const maxH = Math.max(frontCardSize.h, backCardSize.h, ...allBackH);
    const maxW = Math.max(frontCardSize.w, backCardSize.w);
    scene.style.width  = Math.min(maxW, availW) + 'px';
    scene.style.height = Math.min(maxH, availH) + 'px';
  } else {
    // 모바일에서는 body/scene 여백을 별도 로직(updateMobileScenePadding)이 담당하고,
    // 카드 폭/높이는 원본 크기 그대로 두었다가 applyMobileScale이 화면 폭에 맞춰 축소한다.
    document.body.style.paddingTop = '';
    w.style.width  = width + 'px';
    w.style.height = height + 'px';
    scene.style.width = '';
    scene.style.height = '';
  }
  applyMobileScale();
}

//  카드 리사이즈 (세로 길이만 조절 — 가로폭은 고정)
// ══════════════════════════════════════════════
(function() {
  const handle = document.getElementById('card-resize-handle');
  let dragging = false, startY, startH;
  function onDown(e) {
    if (!isAdmin) return;
    dragging = true;
    const p = e.touches ? e.touches[0] : e;
    startY = p.clientY;
    startH = isFlipped
      ? ((pages[currentPage] && typeof pages[currentPage].cardH === 'number') ? pages[currentPage].cardH : backCardSize.h)
      : frontCardSize.h;
    e.preventDefault();
  }
  function onMove(e) {
    if (!dragging) return;
    const p = e.touches ? e.touches[0] : e;
    const dh = p.clientY - startY;
    const newH = Math.max(360, startH + dh);
    if (isFlipped) {
      if (pages[currentPage]) pages[currentPage].cardH = newH;
    } else {
      frontCardSize.h = newH;
    }
    applyCardSize();
  }
  function onUp() { if (dragging) markDirty(); dragging = false; }
  handle.addEventListener('mousedown',  onDown);
  handle.addEventListener('touchstart', onDown, { passive: false });
  document.addEventListener('mousemove',  onMove);
  document.addEventListener('touchmove',  onMove, { passive: false });
  document.addEventListener('mouseup',   onUp);
  document.addEventListener('touchend',  onUp);
})();

async function compressImage(file, maxSizeKB = 300, maxW = 600) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        let w = img.width, h = img.height;
        if (w > maxW) { h = Math.round(h * maxW / w); w = maxW; }
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        let q = 0.85;
        const tryEncode = () => {
          const data = canvas.toDataURL('image/jpeg', q);
          if (data.length / 1024 <= maxSizeKB || q <= 0.1) { resolve(data); }
          else { q -= 0.1; tryEncode(); }
        };
        tryEncode();
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

    ''
  );
  if (url === null) return; // 취소
  const trimmed = url.trim();
  if (trimmed) {
    applyUrlFn(trimmed);
    markDirty();
  } else {
    document.getElementById(fileInputId).click();
  }
}

function renderPages() {
  const container = document.getElementById('pages-container');
  container.innerHTML = '';
  pages.forEach((page, i) => {
    const div = document.createElement('div');
    div.className = 'page';
    div.dataset.pageIdx = i;
    div.style.display = (i === currentPage) ? 'block' : 'none';
    div.innerHTML = '<div class="page-content"></div>';
    container.appendChild(div);
    if (page.locked && !page.unlockedByUser) {
      renderLockOverlay(div, i);
    } else {
      renderPageContent(div.querySelector('.page-content'), page, i);
    }
  });
  updatePageNav();
  renderPageTabs();
  goToPage(currentPage);
}

function renderLockOverlay(pageDiv, idx) {
  const ov = document.createElement('div');
  ov.className = 'page-lock-overlay';
  ov.innerHTML = `
    <div class="lock-icon">🔒</div>
    <div style="font-size:14px;color:#5a3080">PW: 바이오 생일 4자리</div>
    <input type="password" id="unlock-input-${idx}" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')unlockPage(${idx})">
    <button onclick="unlockPage(${idx})">잠금 해제</button>
    <div id="unlock-err-${idx}" style="color:#c00;font-size:12px"></div>
  `;
  pageDiv.querySelector('.page-content').appendChild(ov);
}

function unlockPage(idx) {
  const pw = document.getElementById(`unlock-input-${idx}`).value;
  if (pw === pages[idx].password) {
    pages[idx].unlockedByUser = true;
    renderPages();
  } else {
    document.getElementById(`unlock-err-${idx}`).textContent = '비밀번호가 틀렸습니다.';
  }
}

function ensureOrder(page) {
  const items = [...page.boxes, ...page.stickers, ...page.freeTexts];
  const needsFix = items.some(it => typeof it.order !== 'number');
  if (!needsFix) return;
  let counter = 1;
  page.boxes.forEach(b => { if (typeof b.order !== 'number') b.order = counter++; });
  page.stickers.forEach(s => { if (typeof s.order !== 'number') s.order = counter++; });
  page.freeTexts.forEach(f => { if (typeof f.order !== 'number') f.order = counter++; });
}

function renderPageContent(contentEl, page, pageIdx) {
  contentEl.innerHTML = '';
  ensureOrder(page);
  // 정렬 가이드라인용 엘리먼트 (드래그 중에만 표시됨)
  const guideV = document.createElement('div');
  guideV.className = 'align-guide align-guide-v';
  const guideH = document.createElement('div');
  guideH.className = 'align-guide align-guide-h';
  contentEl.appendChild(guideV);
  contentEl.appendChild(guideH);
  // 박스 / 스티커·이미지 / 자유 텍스트를 하나의 순서(order)로 합쳐서 렌더링
  // → 모바일에서 쌓이는 순서를 관리자가 직접 지정(이동)할 수 있게 함
  const combined = [
    ...page.boxes.map(ref => ({ kind: 'box', ref })),
    ...page.stickers.map(ref => ({ kind: 'sticker', ref })),
    ...page.freeTexts.map(ref => ({ kind: 'freeText', ref })),
  ].sort((a, b) => (a.ref.order || 0) - (b.ref.order || 0));
  combined.forEach(item => {
    if (item.kind === 'box') renderBox(contentEl, item.ref, pageIdx);
    else if (item.kind === 'sticker') renderSticker(contentEl, item.ref, pageIdx);
    else renderFreeText(contentEl, item.ref, pageIdx);
  });
}

function copyBoxText(btn) {
  const body = btn.closest('.back-box').querySelector('.box-body');
  const text = body.innerText;
  const showCopied = () => {
    const original = btn.textContent;
    btn.textContent = '✓ 복사됨';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '복사'; btn.classList.remove('copied'); }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(showCopied).catch(() => fallbackCopyText(text, showCopied));
  } else {
    fallbackCopyText(text, showCopied);
  }
}

// 클립보드 API를 못 쓰는 환경(비보안 컨텍스트, 구형 브라우저 등)을 위한 대체 복사 방법
function fallbackCopyText(text, onDone) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  try { document.execCommand('copy'); } catch (e) {}
  document.body.removeChild(ta);
  if (onDone) onDone();
}

let isDraggingSticker = false;
function makeStickerDraggable(el, s, pageIdx) {
  let dragging = false, startX, startY, origX, origY;
  el.addEventListener('pointerdown', e => {
    if (e.button === 2) return;
    if (e.target.closest('.sticker-resize-handle') || e.target.closest('.sticker-rotate-handle')) return;
    dragging = true; isDraggingSticker = false;
    startX = e.clientX; startY = e.clientY;
    origX = s.x; origY = s.y;
    el.setPointerCapture(e.pointerId);
    e.stopPropagation();
  });
  el.addEventListener('pointermove', e => {
    if (!dragging) return;
    isDraggingSticker = true;
    const sc = currentScaleFactor();
    const rawX = origX + (e.clientX - startX) / sc, rawY = origY + (e.clientY - startY) / sc;
    const container = el.parentElement;
    const pos = container ? applyAlignGuides(container, el, rawX, rawY, el.offsetWidth, el.offsetHeight) : { x: snap(rawX), y: snap(rawY) };
    s.x = pos.x; s.y = pos.y;
    el.style.left = s.x + 'px'; el.style.top = s.y + 'px';
  });
  el.addEventListener('pointerup', () => { dragging = false; if (el.parentElement) hideAlignGuides(el.parentElement); markDirty(); });
  // 휠 = 크기조절 (비율 유지 빠른 조절)
  el.addEventListener('wheel', e => {
    if (!isAdmin) return;
    e.preventDefault();
    const ratio = s.h / s.w;
    s.w = Math.max(16, s.w - e.deltaY * 0.3);
    s.h = Math.max(16, s.w * ratio);
    el.style.width = s.w + 'px'; el.style.height = s.h + 'px';
    markDirty();
  }, { passive: false });
}

// 스티커 리사이즈 핸들: 회전된 상태에서도 가로/세로 자유 비율로 크기 조절
function makeStickerResizable(handle, el, s) {
  let resizing = false, sx, sy, ow, oh;
  const onDown = e => {
    if (!isAdmin) return;
    resizing = true;
    const p = e.touches ? e.touches[0] : e;
    sx = p.clientX; sy = p.clientY;
    ow = s.w; oh = s.h;
    e.preventDefault(); e.stopPropagation();
  };
  const onMove = e => {
    if (!resizing) return;
    const p = e.touches ? e.touches[0] : e;
    const sc = currentScaleFactor();
    const dx = (p.clientX - sx) / sc, dy = (p.clientY - sy) / sc;
    // 회전 각도만큼 역회전시켜 로컬 좌표계 기준 델타로 변환
    const rad = -(s.rot || 0) * Math.PI / 180;
    const localDx = dx * Math.cos(rad) - dy * Math.sin(rad);
    const localDy = dx * Math.sin(rad) + dy * Math.cos(rad);
    s.w = Math.max(16, ow + localDx);
    s.h = Math.max(16, oh + localDy);
    if (!s.rot) { s.w = snap(s.w); s.h = snap(s.h); }
    el.style.width = s.w + 'px'; el.style.height = s.h + 'px';
  };
  const onUp = () => { if (resizing) { resizing = false; markDirty(); } };
  handle.addEventListener('mousedown', onDown);
  handle.addEventListener('touchstart', onDown, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchend', onUp);
}

// 스티커 회전 핸들: 중심점 기준 자유 회전
function makeStickerRotatable(handle, el, s) {
  let rotating = false, cx, cy, startAngle, startRot;
  const angleAt = (px, py) => Math.atan2(py - cy, px - cx) * 180 / Math.PI;
  const onDown = e => {
    if (!isAdmin) return;
    rotating = true;
    const rect = el.getBoundingClientRect();
    cx = rect.left + rect.width / 2; cy = rect.top + rect.height / 2;
    const p = e.touches ? e.touches[0] : e;
    startAngle = angleAt(p.clientX, p.clientY);
    startRot = s.rot || 0;
    e.preventDefault(); e.stopPropagation();
  };
  const onMove = e => {
    if (!rotating) return;
    const p = e.touches ? e.touches[0] : e;
    const cur = angleAt(p.clientX, p.clientY);
    s.rot = Math.round(startRot + (cur - startAngle));
    el.style.transform = `rotate(${s.rot}deg)`;
  };
  const onUp = () => { if (rotating) { rotating = false; markDirty(); } };
  handle.addEventListener('mousedown', onDown);
  handle.addEventListener('touchstart', onDown, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchend', onUp);
}

function showStickerRing(el, s, pageIdx) {

// ══════════════════════════════════════════════
//  드래그 / 리사이즈 (박스)
// ══════════════════════════════════════════════
// 모바일에서는 카드 전체가 scale()로 축소되어 있으므로,
// 마우스/터치 이동량(px)을 실제 좌표 단위로 환산할 때 이 배율로 나눠줘야 한다.
function currentScaleFactor() {
  if (!document.body.classList.contains('mobile-view')) return 1;
  const wrapper = document.getElementById('card-wrapper');
  if (!wrapper) return 1;
  const v = parseFloat(getComputedStyle(wrapper).getPropertyValue('--mobile-scale'));
  return (v && v > 0) ? v : 1;
}

function makeDraggable(el, handle, b, pageIdx) {
  let pending = false, dragging = false, sx, sy, ox, oy, pid = null;
  const DRAG_THRESHOLD = 4; // 이 정도 움직여야 '드래그'로 인정 (그 전엔 클릭/입력으로 취급)

  function onMove(e) {
    if (!pending) return;
    if (!dragging) {
      if (Math.abs(e.clientX - sx) < DRAG_THRESHOLD && Math.abs(e.clientY - sy) < DRAG_THRESHOLD) return;
      // 임계값을 넘은 순간부터 실제 드래그 시작
      dragging = true;
      const active = document.activeElement;
      if (active && active !== document.body && el.contains(active) && active.blur) active.blur();
      try { el.setPointerCapture(pid); } catch (err) {}
    }
    e.preventDefault();
    const s = currentScaleFactor();
    const rawX = ox + (e.clientX - sx) / s, rawY = oy + (e.clientY - sy) / s;
    const container = el.parentElement;
    const pos = container ? applyAlignGuides(container, el, rawX, rawY, el.offsetWidth, el.offsetHeight) : { x: snap(rawX), y: snap(rawY) };
    b.x = pos.x; b.y = pos.y;
    el.style.left = b.x + 'px'; el.style.top = b.y + 'px';
  }
  function onUp() {
    if (dragging) { markDirty(); if (el.parentElement) hideAlignGuides(el.parentElement); }
    pending = false; dragging = false; pid = null;
    document.removeEventListener('pointermove', onMove);
    document.removeEventListener('pointerup', onUp);
    document.removeEventListener('pointercancel', onUp);
  }
  handle.addEventListener('pointerdown', e => {
    if (e.target.tagName === 'BUTTON') return; // ⋮ 옵션 버튼은 드래그 시작 안 함
    pending = true; dragging = false;
    sx = e.clientX; sy = e.clientY; ox = b.x; oy = b.y;
    pid = e.pointerId;
    // 여기서 preventDefault를 하지 않음 → 제목 입력창(INPUT)을 클릭했을 때
    // 움직이지 않고 떼면 평소처럼 포커스가 잡혀서 편집할 수 있음
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
    document.addEventListener('pointercancel', onUp);
  });
}

function makeResizable(el, handle, b, pageIdx) {
  let resizing = false, sx, sy, ow, oh;
  handle.addEventListener('pointerdown', e => {
    resizing = true; sx = e.clientX; sy = e.clientY; ow = b.w; oh = b.h;
    handle.setPointerCapture(e.pointerId);
    e.preventDefault(); e.stopPropagation();
  });
  handle.addEventListener('pointermove', e => {
    if (!resizing) return;
    // 크기 조절은 격자 스냅 없이 항상 자유롭게(px 단위)
    b.w = Math.max(80, ow + e.clientX - sx);
    b.h = Math.max(50, oh + e.clientY - sy);
    el.style.width = b.w + 'px'; el.style.height = b.h + 'px';
  });
  handle.addEventListener('pointerup', () => { resizing = false; markDirty(); });
}

function getPageRect(pageIdx) {
  const pages = document.querySelectorAll('.page');
  return pages[pageIdx] ? pages[pageIdx].getBoundingClientRect() : { left: 0, top: 0 };
}

// ══════════════════════════════════════════════
//  컨텍스트 메뉴
// ══════════════════════════════════════════════
function showCtxMenu(x, y) {
  const menu = document.getElementById('ctx-menu');
  const isBox = ctxTarget && ctxTarget.type === 'box';
  menu.querySelectorAll('.box-only').forEach(el => { el.style.display = isBox ? '' : 'none'; });
  menu.style.display = 'block';
  menu.style.left = x + 'px'; menu.style.top = y + 'px';
}
function hideCtxMenu() { document.getElementById('ctx-menu').style.display = 'none'; }

document.addEventListener('click', e => {
  if (!e.target.closest('#ctx-menu')) hideCtxMenu();
  if (!e.target.closest('#inline-toolbar') && !e.target.closest('.back-box') && !e.target.closest('.free-text')) {
    hideInlineToolbar();
  }
});

// 박스/스티커(이미지)/자유텍스트를 통틀어 하나의 순서 목록으로 만들고,
// 해당 항목을 한 칸 앞/뒤로 이동(order 값 교환)한다.
// 이 순서가 모바일 화면에서 위→아래로 쌓이는 배치 순서가 된다.
function moveOrder(pageIdx, type, id, dir) {
  const page = pages[pageIdx];
  if (!page) return;
  ensureOrder(page);
  const list = [...page.boxes, ...page.stickers, ...page.freeTexts]
    .sort((a, b) => (a.order || 0) - (b.order || 0));
  let target;
  if (type === 'box') target = page.boxes.find(o => o.id === id);
  else if (type === 'sticker') target = page.stickers.find(o => o.id === id);
  else if (type === 'freeText') target = page.freeTexts.find(o => o.id === id);
  if (!target) return;
  const idx = list.indexOf(target);
  const swapIdx = idx + dir;
  if (idx === -1 || swapIdx < 0 || swapIdx >= list.length) return;
  const other = list[swapIdx];
  const tmp = target.order;
  target.order = other.order;
  other.order = tmp;
  renderPages();
  markDirty();
}

function ctxAction(action) {
  hideCtxMenu();
  if (!ctxTarget) return;
  const { type, id, pageIdx } = ctxTarget;

  if (action === 'delete') {
    if (type === 'box') pages[pageIdx].boxes = pages[pageIdx].boxes.filter(b => b.id !== id);
    else if (type === 'sticker') pages[pageIdx].stickers = pages[pageIdx].stickers.filter(s => s.id !== id);
    else if (type === 'freeText') pages[pageIdx].freeTexts = pages[pageIdx].freeTexts.filter(f => f.id !== id);
    renderPages(); markDirty(); return;
  }

  if (action === 'duplicate') {
    if (type === 'box') duplicateBox(id, pageIdx);
    return;
  }

  if (action === 'moveUp' || action === 'moveDown') {
    moveOrder(pageIdx, type, id, action === 'moveUp' ? -1 : 1);
    return;
  }

  if (type === 'box') {
    const box = pages[pageIdx].boxes.find(b => b.id === id);
    if (!box) return;
    if (action === 'color') {
      const picker = document.getElementById('ctx-color-picker');
      picker.value = rgbToHex(box.bg) || '#ffffff';
      picker.onchange = () => { box.bg = picker.value; renderPages(); markDirty(); };
      picker.click();
    } else if (action === 'textcolor') {
      const picker = document.getElementById('ctx-color-picker');
      picker.value = rgbToHex(box.fg) || '#000000';
      picker.onchange = () => { box.fg = picker.value; renderPages(); markDirty(); };
      picker.click();
    } else if (action === 'titlecolor') {
      const picker = document.getElementById('ctx-color-picker');
      picker.value = box.titleColor || '#9a7020';
      picker.onchange = () => { box.titleColor = picker.value; renderPages(); markDirty(); };
      picker.click();
    } else if (action === 'bordercolor') {
      const picker = document.getElementById('ctx-color-picker');
      picker.value = box.borderColor || '#e0c880';
      picker.onchange = () => { box.borderColor = picker.value; renderPages(); markDirty(); };
      picker.click();
    } else if (action === 'img') {
      const fp = document.getElementById('ctx-img-picker');
      fp.onchange = async e => {
        const file = e.target.files[0]; if (!file) return;
        box.img = await compressImage(file, 200, 400);
        renderPages(); markDirty(); fp.value = '';
      };
      insertImageVia('ctx-img-picker', u => {
        box.img = u; renderPages(); markDirty();
      }, '박스 이미지 URL을 입력하세요');
    }
  }
  if (type === 'freeText') {
    const ft = pages[pageIdx].freeTexts.find(f => f.id === id);
    if (!ft) return;
    if (action === 'textcolor') {
      const picker = document.getElementById('ctx-color-picker');
      picker.value = rgbToHex(ft.color) || '#000000';
      picker.onchange = () => { ft.color = picker.value; renderPages(); markDirty(); };
      picker.click();
    } else if (action === 'delete') {
      pages[pageIdx].freeTexts = pages[pageIdx].freeTexts.filter(f => f.id !== id);
      renderPages(); markDirty();
    }
  }
}

function rgbToHex(color) {
  if (!color) return '#000000';
  if (color.startsWith('#')) return color;
  return '#000000';
}

// ══════════════════════════════════════════════
//  인라인 툴바 (형광펜 / 글자 크기)
// ══════════════════════════════════════════════
let savedRange = null;

document.addEventListener('mouseup', e => {
  if (!isAdmin) return;
  if (e.target.closest('#inline-toolbar')) return;
  const sel = window.getSelection();
  if (!sel || sel.rangeCount === 0 || sel.isCollapsed) { hideInlineToolbar(); return; }
  const range = sel.getRangeAt(0);
  const parent = range.commonAncestorContainer;
  const inBox = el => {
    let n = el.nodeType === 3 ? el.parentNode : el;
    while (n) { if (n.classList && (n.classList.contains('box-body') || n.classList.contains('free-text'))) return true; n = n.parentNode; }
    return false;
  };
  if (!inBox(parent)) { hideInlineToolbar(); return; }
  savedRange = range.cloneRange();
  showInlineToolbar(e.clientX, e.clientY - 48);
});

function showInlineToolbar(x, y) {
  const tb = document.getElementById('inline-toolbar');
  tb.style.display = 'flex';
  tb.style.left = Math.min(x, window.innerWidth - 240) + 'px';
  tb.style.top  = Math.max(8, y) + 'px';
}
function hideInlineToolbar() {
  document.getElementById('inline-toolbar').style.display = 'none';
  savedRange = null;
}

function applyHL(cls) {
  if (!savedRange) return;
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(savedRange);
  const mark = document.createElement('mark');
  if (cls !== 'yellow') mark.className = cls;
  try { savedRange.surroundContents(mark); } catch(e) { document.execCommand('bold', false, null); }
  markDirty();
}
function removeHL() {
  if (!savedRange) return;
  document.execCommand('removeFormat'); markDirty();
}
function applyFontSize() {
  const sz = document.getElementById('font-size-input').value;
  if (!sz || !savedRange) return;
  const span = document.createElement('span');
  span.style.fontSize = sz + 'px';
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(savedRange);
  try { savedRange.surroundContents(span); } catch(e) {}
  markDirty();
}
function applyFontFamily() {
  const fontSel = document.getElementById('font-family-input');
  const fam = fontSel.value;
  if (!fam || !savedRange) return;
  const span = document.createElement('span');
  span.style.fontFamily = fam;
  const sel = window.getSelection();
  sel.removeAllRanges(); sel.addRange(savedRange);
  try { savedRange.surroundContents(span); } catch(e) {}
  markDirty();
  fontSel.value = '';
}

// ══════════════════════════════════════════════
//  저장 / 동기화
// ══════════════════════════════════════════════
let dirty = false;
function markDirty() { dirty = true; }

function collectState() {
  return {
    version: 2,
    front: {
      title: document.getElementById('front-title').value,
      name: document.getElementById('field-name').value,
      birth: document.getElementById('field-birth').value,
      skill: document.getElementById('field-skill').value,
      profileShape: document.getElementById('shape-sel').value,
      profileImg: (document.getElementById('profile-img-container').querySelector('img') || {}).src || null,
      icon1: document.getElementById('icon1').querySelector('img') ? document.getElementById('icon1').querySelector('img').src : document.getElementById('icon1').textContent,
      icon2: document.getElementById('icon2').querySelector('img') ? document.getElementById('icon2').querySelector('img').src : document.getElementById('icon2').textContent,
    },
    design: {
      bgColor: document.getElementById('bg-color').value,
      cardColor: document.getElementById('card-color').value,
      gridColor: document.getElementById('grid-color').value,
      bgBlur: document.getElementById('bg-blur').value,
      titleColor: document.getElementById('title-color').value,
      fieldBgColor: document.getElementById('field-bg-color').value,
      fieldTextColor: document.getElementById('field-text-color').value,
      fieldLabelColor: document.getElementById('field-label-color').value,
      accentColor: document.getElementById('accent-color').value,
      boxShadowColor: document.getElementById('box-shadow-color').value,
      font: document.getElementById('font-sel').value,
      bgImage: document.body.style.backgroundImage || '',
    },
    pages: pages.map(p => ({
      boxes: p.boxes, stickers: p.stickers, freeTexts: p.freeTexts,
      locked: p.locked, password: p.password,
      name: p.name || null, cardH: p.cardH || backCardSize.h
    })),
    frontCardSize, backCardSize
  };
}

function applyState(state) {
  if (!state) return;
  // 앞면
  if (state.front) {
    const f = state.front;
    document.getElementById('front-title').value = f.title || '';
    document.getElementById('field-name').value  = f.name  || '';
    document.getElementById('field-birth').value = f.birth || '';
    document.getElementById('field-skill').value = f.skill || '';
    const shapeEl = document.getElementById('shape-sel');
    if (f.profileShape) { shapeEl.value = f.profileShape; setProfileShape(f.profileShape); }
    if (f.profileImg) {
      document.getElementById('profile-img-container').innerHTML = `<img src="${f.profileImg}" alt="프로필">`;
    }
    // icons
    const icon1El = document.getElementById('icon1');
    const icon2El = document.getElementById('icon2');
    if (f.icon1) {
      if (f.icon1.startsWith('data:') || f.icon1.startsWith('http')) icon1El.innerHTML = `<img src="${f.icon1}" alt="">`;
      else icon1El.textContent = f.icon1;
    }
    if (f.icon2) {
      if (f.icon2.startsWith('data:') || f.icon2.startsWith('http')) icon2El.innerHTML = `<img src="${f.icon2}" alt="">`;
      else icon2El.textContent = f.icon2;
    }
  }
  // 디자인
  if (state.design) {
    const d = state.design;
    if (d.bgColor) { document.getElementById('bg-color').value = d.bgColor; setBgColor(d.bgColor); }
    if (d.cardColor) { document.getElementById('card-color').value = d.cardColor; setCardColor(d.cardColor); }
    if (d.gridColor) { document.getElementById('grid-color').value = d.gridColor; setGridColor(d.gridColor); }
    if (d.bgBlur) { document.getElementById('bg-blur').value = d.bgBlur; setBgBlur(d.bgBlur); }
    if (d.titleColor) { document.getElementById('title-color').value = d.titleColor; setTitleColor(d.titleColor); }
    if (d.fieldBgColor) { document.getElementById('field-bg-color').value = d.fieldBgColor; setFieldBgColor(d.fieldBgColor); }
    if (d.fieldTextColor) { document.getElementById('field-text-color').value = d.fieldTextColor; setFieldTextColor(d.fieldTextColor); }
    if (d.fieldLabelColor) { document.getElementById('field-label-color').value = d.fieldLabelColor; setFieldLabelColor(d.fieldLabelColor); }
    if (d.accentColor) { document.getElementById('accent-color').value = d.accentColor; setAccentColor(d.accentColor); }
    if (d.boxShadowColor) { document.getElementById('box-shadow-color').value = d.boxShadowColor; setBoxShadowColor(d.boxShadowColor); }
    if (d.font) { document.getElementById('font-sel').value = d.font; setFont(d.font); }
    if (d.bgImage) { document.body.style.backgroundImage = d.bgImage; document.body.style.backgroundSize='cover'; document.body.style.backgroundPosition='center'; }
  }
  // 페이지
  if (state.pages) {
    pages = state.pages.map(p => ({ ...p, unlockedByUser: false }));
  }
  if (state.frontCardSize) { frontCardSize = state.frontCardSize; }
  if (state.backCardSize)  { backCardSize  = state.backCardSize; }
  applyCardSize();
  renderPages();
}

function saveStateToStorage() {
  try { localStorage.setItem('card_state', JSON.stringify(collectState())); } catch(e) {}
}

function loadStateFromStorage() {
  try {
    const s = localStorage.getItem('card_state');
    if (s) applyState(JSON.parse(s));
  } catch(e) {}
}

async function saveData() {
  if (!isAdmin) return;
  saveStateToStorage();
  const gistId = localStorage.getItem('gist_id');
  const ghToken = localStorage.getItem('gh_token') ? atob(localStorage.getItem('gh_token')) : '';
  if (!gistId || !ghToken) {
    showSync('Gist ID / 토큰 미설정 (로컬에만 저장됨)', 'err');
    return;
  }
  await syncToGist();
}

async function syncToGist() {
  const gistId = localStorage.getItem('gist_id');
  const ghToken = atob(localStorage.getItem('gh_token') || '');
  if (!gistId || !ghToken) return;
  showSync('GitHub에 저장 중...', 'loading');
  const state = collectState();
  const body = JSON.stringify({ files: { 'card-data.json': { content: JSON.stringify(state) } } });
  try {
    const resp = await fetch(`https://api.github.com/gists/${gistId}`, {
      method: 'PATCH',
      headers: {
        'Authorization': `token ${ghToken}`,
        'Content-Type': 'application/json'
      },
      body
    });
    if (resp.ok) {
      showSync('✅ GitHub 저장 완료!', 'ok');
      saveStateToStorage();
    } else {
      const err = await resp.json();
      handleGistError(resp.status, err);
    }
  } catch(e) {
    showSync('❌ 네트워크 오류: ' + e.message, 'err');
  }
}

async function loadFromGist(opts) {
  const silent = opts && opts.silent;
  // 관리자가 자기 브라우저에 별도 gist_id를 설정했으면 그걸 우선 사용,
  // 없으면(=일반 방문자) 코드에 박아둔 DEFAULT_GIST_ID 사용
  const gistId = localStorage.getItem('gist_id') || DEFAULT_GIST_ID;
  const ghToken = localStorage.getItem('gh_token') ? atob(localStorage.getItem('gh_token')) : '';
  if (!gistId) {
    if (!silent) showSync('Gist ID가 설정되지 않았습니다.', 'err');
    return false;
  }
  if (!silent) showSync('불러오는 중...', 'loading');
  try {
    const headers = { 'Content-Type': 'application/json' };
    if (ghToken) headers['Authorization'] = `token ${ghToken}`;
    const resp = await fetch(`https://api.github.com/gists/${gistId}`, { headers });
    if (resp.ok) {
      const data = await resp.json();
      const file = data.files && data.files['card-data.json'];
      if (file) {
        const state = JSON.parse(file.content);
        applyState(state);
        saveStateToStorage(); // 다음 방문 시 깜빡임 없이 보여주기 위한 로컬 캐시 갱신
        if (!silent) showSync('✅ 불러오기 완료!', 'ok');
        return true;
      } else {
        if (!silent) showSync('card-data.json 파일을 Gist에서 찾을 수 없습니다.', 'err');
        return false;
      }
    } else {
      const err = await resp.json().catch(() => ({}));
      if (!silent) handleGistError(resp.status, err);
      return false;
    }
  } catch(e) {
    if (!silent) showSync('❌ 네트워크 오류: ' + e.message, 'err');
    return false;
  }
}

function handleGistError(status, err) {
  const msg = err && err.message ? err.message : '';
  if (status === 401) showSync('❌ 401: 인증 실패 — GitHub 토큰을 확인하세요.', 'err');
  else if (status === 403) {
    if (msg.includes('rate limit')) showSync('❌ 403: API 속도 제한 초과 — 잠시 후 재시도하세요.', 'err');
    else showSync('❌ 403: 권한 없음 — 토큰의 gist 스코프를 확인하세요.', 'err');
  }
  else if (status === 404) showSync('❌ 404: Gist를 찾을 수 없습니다 — Gist ID를 확인하세요.', 'err');
  else if (status === 422) showSync('❌ 422: 데이터 오류 — 저장 내용을 확인하세요.', 'err');
  else if (status >= 500) showSync(`❌ ${status}: GitHub 서버 오류 — 잠시 후 재시도하세요.`, 'err');
  else showSync(`❌ 오류 ${status}: ${msg}`, 'err');
}

function showSync(msg, type) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.className = type || '';
  el.style.display = 'block';
  if (type === 'ok') setTimeout(() => { el.style.display = 'none'; }, 3000);
}

// 자동 저장 (로컬)
setInterval(() => { if (dirty) { saveStateToStorage(); dirty = false; } }, 5000);

// ══════════════════════════════════════════════
//  이미지 보호 (우클릭/드래그 방지)
// ══════════════════════════════════════════════
document.addEventListener('contextmenu', e => {
  if (!isAdmin) e.preventDefault();
});
document.addEventListener('dragstart', e => { if (e.target.tagName === 'IMG') e.preventDefault(); });
document.addEventListener('selectstart', e => {
  const el = e.target;
  const editable = el.closest('[contenteditable=true]') || el.tagName === 'INPUT' || el.tagName === 'TEXTAREA';
  if (!editable && !isAdmin) e.preventDefault();
});

// ══════════════════════════════════════════════
//  유틸
// ══════════════════════════════════════════════
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function openModal(id)  { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

// ══════════════════════════════════════════════
//  키보드 단축키
// ══════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (!isAdmin) return;
  if ((e.ctrlKey||e.metaKey) && e.key === 's') { e.preventDefault(); saveData(); }
});

// ══════════════════════════════════════════════
//  시작
// ══════════════════════════════════════════════
init();
</script>
